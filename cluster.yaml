# SnapSpec Cluster Configuration
#
# Update the IPs below to match your machines.
# Find your IP: ifconfig en0 | grep "inet "
#
# Each person runs:
#   python launch.py --id <their-node-id>
#
# The coordinator (node 0 by default) also runs the experiment.

nodes:
  - id: 0
    host: "192.168.1.10"    # Machine A (coordinator + node)
    port: 9000
  - id: 1
    host: "192.168.1.11"    # Machine B
    port: 9000
  - id: 2
    host: "192.168.1.12"    # Machine C
    port: 9000

coordinator_node: 0          # Which node also runs the coordinator

# Workload settings
workload:
  write_rate: 200            # Writes per second per node
  cross_node_ratio: 0.2      # 20% cross-node transfers
  total_tokens: 100000       # Total balance across all nodes
  block_size: 4096
  total_blocks: 256

# Experiment settings
experiment:
  duration_s: 15             # How long each strategy runs
  snapshot_interval_s: 1.0   # Time between snapshots
  strategies: "all"          # all, pause_and_snap, two_phase, speculative
  output_dir: "results"

# Block store: row, cow, fullcopy, sqlite
block_store: "row"
